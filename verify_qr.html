<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Verification</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: #fff;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 500px;
    text-align: center;
  }

  h2 {
    color: #333;
    margin-bottom: 30px;
    font-size: 28px;
    letter-spacing: 0.5px;
  }

  .field {
    margin-bottom: 20px;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    padding: 10px 15px;
    border-radius: 8px;
    background: #f8f9fa;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
  }

  .field span {
    font-weight: 500;
    color: #555;
  }

  .badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
  }

  .valid {
    background-color: #28a745; /* green */
  }

  .expired {
    background-color: #dc3545; /* red */
  }

  #result {
    margin-top: 10px;
  }

</style>
</head>

<body>
  <div class="container">
    <h2>Vehicle Verification</h2>
    <div id="result">Loading...</div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
  authDomain: "smart-traffic-30f86.firebaseapp.com",
  projectId: "smart-traffic-30f86",
  storageBucket: "smart-traffic-30f86.firebasestorage.app",
  messagingSenderId: "16532299128",
  appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d",
  measurementId: "G-91R0R3QR0F"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadVehicle() {
  const docRef = doc(db, "vehicles", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();
    let today = new Date().toISOString().split('T')[0];

    let pucStatus = data.puc_expiry >= today ? 
      '<span class="badge valid">VALID ✅</span>' : 
      '<span class="badge expired">EXPIRED ❌</span>';

    let licenseStatus = data.license_expiry >= today ? 
      '<span class="badge valid">VALID ✅</span>' : 
      '<span class="badge expired">EXPIRED ❌</span>';

    document.getElementById("result").innerHTML = `
      <div class="field"><span>Owner Name:</span> <span>${data.name}</span></div>
      <div class="field"><span>Vehicle Number:</span> <span>${data.vehicle}</span></div>
      <div class="field"><span>License Number:</span> <span>${data.license}</span></div>
      <div class="field"><span>License Expiry:</span> <span>${data.license_expiry}</span></div>
      <div class="field"><span>License Status:</span> ${licenseStatus}</div>
      <div class="field"><span>PUC Number:</span> <span>${data.puc}</span></div>
      <div class="field"><span>PUC Expiry:</span> <span>${data.puc_expiry}</span></div>
      <div class="field"><span>PUC Status:</span> ${pucStatus}</div>
    `;
  } else {
    document.getElementById("result").innerHTML = '<span class="badge expired">Vehicle Not Found ❌</span>';
  }
}

loadVehicle();
</script>
</body>
</html>
