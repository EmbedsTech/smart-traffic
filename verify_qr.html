<!DOCTYPE html>
<html>
<head>
<title>Vehicle Verification</title>
</head>

<body>

<h2>Vehicle Verification</h2>

<div id="result">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
  authDomain: "smart-traffic-30f86.firebaseapp.com",
  projectId: "smart-traffic-30f86",
  storageBucket: "smart-traffic-30f86.firebasestorage.app",
  messagingSenderId: "16532299128",
  appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d",
  measurementId: "G-91R0R3QR0F"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadVehicle() {

const docRef = doc(db, "vehicles", id);
const docSnap = await getDoc(docRef);

if(docSnap.exists()) {

const data = docSnap.data();

let today = new Date().toISOString().split('T')[0];

let pucStatus = data.puc_expiry >= today ? "VALID ✅" : "EXPIRED ❌";
let licenseStatus = data.license_expiry >= today ? "VALID ✅" : "EXPIRED ❌";

document.getElementById("result").innerHTML = `
Owner Name: ${data.name} <br><br>
Vehicle Number: ${data.vehicle} <br><br>
License Number: ${data.license} <br><br>

License Expiry: ${data.license_expiry} <br>
License Status: ${licenseStatus} <br><br>

PUC Number: ${data.puc} <br>
PUC Expiry: ${data.puc_expiry} <br>
PUC Status: ${pucStatus}
`;

}
else{

document.getElementById("result").innerHTML = "Vehicle Not Found ❌";

}

}

loadVehicle();

</script>

</body>
</html>
