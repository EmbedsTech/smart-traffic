<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Verification</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: #fff;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 700px;
  }

  h2 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
    font-size: 28px;
    letter-spacing: 0.5px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 30px;
  }

  .field {
    background: #f8f9fa;
    padding: 15px 12px;
    border-radius: 10px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
  }

  .field span.label {
    font-weight: 500;
    color: #555;
    margin-bottom: 5px;
  }

  .field span.value {
    font-weight: 500;
    color: #333;
  }

  .badge {
    margin-top: 5px;
    padding: 4px 10px;
    border-radius: 15px;
    font-weight: 600;
    font-size: 13px;
    color: #fff;
    width: fit-content;
  }

  .valid {
    background-color: #28a745; /* green */
  }

  .expired {
    background-color: #dc3545; /* red */
  }

  #result {
    margin-top: 10px;
  }

</style>
</head>

<body>
  <div class="container">
    <h2>Vehicle Verification</h2>
    <div id="result">Loading...</div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
  authDomain: "smart-traffic-30f86.firebaseapp.com",
  projectId: "smart-traffic-30f86",
  storageBucket: "smart-traffic-30f86.firebasestorage.app",
  messagingSenderId: "16532299128",
  appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d",
  measurementId: "G-91R0R3QR0F"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadVehicle() {
  const docRef = doc(db, "vehicles", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();
    let today = new Date().toISOString().split('T')[0];

    const licenseStatus = data.license_expiry >= today ? 
      '<span class="badge valid">VALID ✅</span>' : 
      '<span class="badge expired">EXPIRED ❌</span>';

    const pucStatus = data.puc_expiry >= today ? 
      '<span class="badge valid">VALID ✅</span>' : 
      '<span class="badge expired">EXPIRED ❌</span>';

    const insuranceStatus = data.insurance_expiry >= today ? 
      '<span class="badge valid">VALID ✅</span>' : 
      '<span class="badge expired">EXPIRED ❌</span>';

    document.getElementById("result").innerHTML = `
      <div class="grid">
        <div class="field">
          <span class="label">Owner Name:</span>
          <span class="value">${data.name}</span>
        </div>
        <div class="field">
          <span class="label">Vehicle Number:</span>
          <span class="value">${data.vehicle}</span>
        </div>

        <div class="field">
          <span class="label">License Number:</span>
          <span class="value">${data.license}</span>
          ${licenseStatus}
        </div>
        <div class="field">
          <span class="label">License Expiry:</span>
          <span class="value">${data.license_expiry}</span>
        </div>

        <div class="field">
          <span class="label">PUC Number:</span>
          <span class="value">${data.puc}</span>
          ${pucStatus}
        </div>
        <div class="field">
          <span class="label">PUC Expiry:</span>
          <span class="value">${data.puc_expiry}</span>
        </div>

        <div class="field">
          <span class="label">Insurance ID:</span>
          <span class="value">${data.insurance}</span>
          ${insuranceStatus}
        </div>
        <div class="field">
          <span class="label">Insurance Expiry:</span>
          <span class="value">${data.insurance_expiry}</span>
        </div>
      </div>
    `;
  } else {
    document.getElementById("result").innerHTML = '<span class="badge expired">Vehicle Not Found ❌</span>';
  }
}

loadVehicle();
</script>
</body>
</html>
