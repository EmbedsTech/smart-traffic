<!DOCTYPE html>
<html>
<head>
<title>Police Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

/* background */

background: linear-gradient(135deg,#dbe8f7,#bcd0e8);
}


/* login card */

.login-box{

width:360px;
padding:40px;

background:#cfd8e6;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

text-align:center;
}


/* heading */

h2{
margin-bottom:30px;
font-size:28px;
}


/* input */

input{

width:100%;
padding:14px;

margin:12px 0;

border-radius:8px;
border:none;

background:#e5e5e5;

font-size:16px;
}


/* focus effect */

input:focus{
outline:none;
border:2px solid #4e8df5;
}


/* button */

button{

width:100%;
padding:14px;

margin-top:20px;

border:none;
border-radius:30px;

font-size:18px;
font-weight:bold;

color:white;

background:linear-gradient(90deg,#5a8dee,#2f65c9);

cursor:pointer;
}


/* hover */

button:hover{

opacity:0.9;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Police Login</h2>

<input type="text" id="user" placeholder="Police ID">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="police" && p=="1234"){

localStorage.setItem("auth","true");

window.location="status.html";

}
else{

alert("Invalid Login");

}

}

</script>

</body>
</html>
