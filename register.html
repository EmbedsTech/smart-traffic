<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Roboto',sans-serif;
}

body{
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:100%;
max-width:700px;
}

h2{
text-align:center;
margin-bottom:30px;
}

form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

label{
font-size:14px;
margin-bottom:5px;
display:block;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

.full{
grid-column:span 2;
}

button{
grid-column:span 2;
padding:12px;
background:#007bff;
color:white;
border:none;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#msg{
grid-column:span 2;
text-align:center;
margin-top:15px;
font-weight:bold;
}

#qrcode{
grid-column:span 2;
text-align:center;
margin-top:20px;
padding:15px;
background:white;
}

#downloadBtn{
display:none;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Vehicle Registration</h2>

<form onsubmit="event.preventDefault(); registerVehicle();">

<div>
<label>Owner Name</label>
<input type="text" id="name">
</div>

<div>
<label>Vehicle Number</label>
<input type="text" id="vehicle">
</div>

<div>
<label>License Number</label>
<input type="text" id="license">
</div>

<div>
<label>License Expiry</label>
<input type="date" id="license_expiry">
</div>

<div class="full">
<label>License Image</label>
<input type="file" id="license_img">
</div>

<div>
<label>PUC Number</label>
<input type="text" id="puc">
</div>

<div>
<label>PUC Expiry</label>
<input type="date" id="puc_expiry">
</div>

<div class="full">
<label>PUC Image</label>
<input type="file" id="puc_img">
</div>

<div>
<label>Insurance Number</label>
<input type="text" id="insurance">
</div>

<div>
<label>Insurance Expiry</label>
<input type="date" id="insurance_expiry">
</div>

<div class="full">
<label>Insurance Image</label>
<input type="file" id="insurance_img">
</div>

<button type="submit">Submit & Generate QR</button>

<p id="msg"></p>

<div id="qrcode"></div>

<button id="downloadBtn" onclick="downloadQR()">Download QR</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase */

const firebaseConfig = {
apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
authDomain: "smart-traffic-30f86.firebaseapp.com",
projectId: "smart-traffic-30f86",
storageBucket: "smart-traffic-30f86.appspot.com",
messagingSenderId: "16532299128",
appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Register Vehicle */

window.registerVehicle = async function(){

let name=document.getElementById("name").value.trim();
let vehicle=document.getElementById("vehicle").value.trim();
let license=document.getElementById("license").value.trim();
let license_expiry=document.getElementById("license_expiry").value;
let puc=document.getElementById("puc").value.trim();
let puc_expiry=document.getElementById("puc_expiry").value;
let insurance=document.getElementById("insurance").value.trim();
let insurance_expiry=document.getElementById("insurance_expiry").value;

if(!name || !vehicle || !license || !license_expiry || !puc || !puc_expiry || !insurance || !insurance_expiry){

document.getElementById("msg").innerHTML="<span style='color:red'>Please fill all fields</span>";
return;

}

/* Save in Firestore */

const docRef = await addDoc(collection(db,"vehicles"),{

name,
vehicle,
license,
license_expiry,
puc,
puc_expiry,
insurance,
insurance_expiry

});

document.getElementById("msg").innerHTML="Registered Successfully";

/* Generate QR */

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:"https://traffic-api-pjz9.onrender.com/verify?id="+docRef.id,
width:220,
height:220,
colorDark:"#000000",
colorLight:"#ffffff"
});

document.getElementById("downloadBtn").style.display="block";

}

/* Download QR with forced white background */

window.downloadQR=function(){

let canvas=document.querySelector("#qrcode canvas");

let newCanvas=document.createElement("canvas");
newCanvas.width=canvas.width;
newCanvas.height=canvas.height;

let ctx=newCanvas.getContext("2d");

/* white background */

ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,newCanvas.width,newCanvas.height);

/* draw qr */

ctx.drawImage(canvas,0,0);

let image=newCanvas.toDataURL("image/png");

let link=document.createElement("a");
link.href=image;
link.download="vehicle_qr.png";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

</script>

</body>

</html>
