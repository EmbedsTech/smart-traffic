<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Roboto',sans-serif;
}

body{
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:100%;
max-width:700px;
}

h2{
text-align:center;
margin-bottom:30px;
}

form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

label{
font-size:14px;
margin-bottom:5px;
display:block;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
grid-column:span 2;
padding:12px;
background:#007bff;
color:white;
border:none;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#msg{
grid-column:span 2;
text-align:center;
margin-top:15px;
font-weight:bold;
}

#qrcode{
grid-column:span 2;
text-align:center;
margin-top:20px;
}

#downloadBtn{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Vehicle Registration</h2>

<form id="vehicleForm" onsubmit="event.preventDefault(); registerVehicle();">

<div>
<label>Owner Name</label>
<input type="text" id="name">
</div>

<div>
<label>Vehicle Number</label>
<input type="text" id="vehicle">
</div>

<div>
<label>License Number</label>
<input type="text" id="license">
</div>

<div>
<label>License Expiry</label>
<input type="date" id="license_expiry">
</div>

<div>
<label>Upload License Image</label>
<input type="file" id="license_img">
</div>

<div>
<label>PUC Number</label>
<input type="text" id="puc">
</div>

<div>
<label>PUC Expiry</label>
<input type="date" id="puc_expiry">
</div>

<div>
<label>Upload PUC Image</label>
<input type="file" id="puc_img">
</div>

<div>
<label>Insurance ID</label>
<input type="text" id="insurance">
</div>

<div>
<label>Insurance Expiry</label>
<input type="date" id="insurance_expiry">
</div>

<div>
<label>Upload Insurance Image</label>
<input type="file" id="insurance_img">
</div>

<button type="submit">Submit & Generate QR</button>

<p id="msg"></p>

<div id="qrcode"></div>

<button id="downloadBtn" onclick="downloadQR()">Download QR</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
authDomain: "smart-traffic-30f86.firebaseapp.com",
projectId: "smart-traffic-30f86",
storageBucket: "smart-traffic-30f86.appspot.com",
messagingSenderId: "16532299128",
appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let qr;

window.registerVehicle = async function(){

let name=document.getElementById("name").value.trim();
let vehicle=document.getElementById("vehicle").value.trim();
let license=document.getElementById("license").value.trim();
let license_expiry=document.getElementById("license_expiry").value;
let puc=document.getElementById("puc").value.trim();
let puc_expiry=document.getElementById("puc_expiry").value;
let insurance=document.getElementById("insurance").value.trim();
let insurance_expiry=document.getElementById("insurance_expiry").value;

let license_img=document.getElementById("license_img").files[0];
let puc_img=document.getElementById("puc_img").files[0];
let insurance_img=document.getElementById("insurance_img").files[0];

if(!name || !vehicle || !license || !license_expiry || !puc || !puc_expiry || !insurance || !insurance_expiry){

document.getElementById("msg").innerHTML="<span style='color:red'>Please fill all fields</span>";
return;

}

const docRef = await addDoc(collection(db,"vehicles"),{

name,
vehicle,
license,
license_expiry,
puc,
puc_expiry,
insurance,
insurance_expiry,
license_image: license_img ? license_img.name : "",
puc_image: puc_img ? puc_img.name : "",
insurance_image: insurance_img ? insurance_img.name : ""

});

document.getElementById("msg").innerHTML="Registered Successfully";

/* QR Generate */

document.getElementById("qrcode").innerHTML="";

qr = new QRCode(document.getElementById("qrcode"),{
text:"https://traffic-api-pjz9.onrender.com/verify?id="+docRef.id,
width:200,
height:200
});

/* Show download button */

document.getElementById("downloadBtn").style.display="block";

}

/* QR Download */

window.downloadQR=function(){

let img=document.querySelector("#qrcode img");

let link=document.createElement("a");

link.href=img.src;
link.download="vehicle_qr.png";

link.click();

}

</script>

</body>

</html>
