<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
  authDomain: "smart-traffic-30f86.firebaseapp.com",
  projectId: "smart-traffic-30f86",
  storageBucket: "smart-traffic-30f86.firebasestorage.app",
  messagingSenderId: "16532299128",
  appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d",
  measurementId: "G-91R0R3QR0F"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.registerVehicle = async function() {

  let name = document.getElementById("name").value.trim();
  let vehicle = document.getElementById("vehicle").value.trim().toUpperCase();
  let license = document.getElementById("license").value.trim();
  let license_expiry = document.getElementById("license_expiry").value;
  let puc = document.getElementById("puc").value.trim();
  let puc_expiry = document.getElementById("puc_expiry").value;

  // Vehicle number regex validation
  const standardRegex = /^[A-Z]{2}\d{2}[A-Z]{1,2}\d{4}$/; // e.g., MH01AB2345
  const bhRegex = /^BH\d{2}[A-Z]{2}\d{4}$/; // e.g., BH01AB2345

  if(!name || !vehicle || !license || !license_expiry || !puc || !puc_expiry){
    document.getElementById("msg").innerHTML = "<span style='color:red'>Please fill all fields!</span>";
    return;
  }

  if(!standardRegex.test(vehicle) && !bhRegex.test(vehicle)) {
    document.getElementById("msg").innerHTML = "<span style='color:red'>Invalid Vehicle Number!<br>Format: Standard (MH01AB2345) or BH Series (BH01AB2345)</span>";
    return;
  }

  const docRef = await addDoc(collection(db,"vehicles"),{
    name:name,
    vehicle:vehicle,
    license:license,
    license_expiry:license_expiry,
    puc:puc,
    puc_expiry:puc_expiry
  });

  document.getElementById("msg").innerHTML =
    "Registered Successfully ✅<br><br>" +
    "<a href='qr.html?id="+docRef.id+"'>Generate QR Code</a>";
}
</script>
