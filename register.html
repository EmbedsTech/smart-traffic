<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Registration</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:600px;
margin:auto;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
margin-bottom:20px;
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

label{
text-align:left;
font-size:14px;
}

input{
padding:8px;
width:100%;
}

.full{
grid-column:1/3;
}

button{
grid-column:1/3;
padding:10px;
background:#007bff;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#qrcode{
margin-top:20px;
}

#downloadBtn{
display:none;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Vehicle Registration</h2>

<form onsubmit="event.preventDefault(); registerVehicle();">

<div>
<label>Owner Name</label>
<input type="text" id="name">
</div>

<div>
<label>Vehicle Number</label>
<input type="text" id="vehicle">
</div>

<div>
<label>License Number</label>
<input type="text" id="license">
</div>

<div>
<label>License Expiry</label>
<input type="date" id="license_expiry">
</div>

<div class="full">
<label>License Image</label>
<input type="file" id="license_img">
</div>

<div>
<label>PUC Number</label>
<input type="text" id="puc">
</div>

<div>
<label>PUC Expiry</label>
<input type="date" id="puc_expiry">
</div>

<div class="full">
<label>PUC Image</label>
<input type="file" id="puc_img">
</div>

<div>
<label>Insurance Number</label>
<input type="text" id="insurance">
</div>

<div>
<label>Insurance Expiry</label>
<input type="date" id="insurance_expiry">
</div>

<div class="full">
<label>Insurance Image</label>
<input type="file" id="insurance_img">
</div>

<button type="submit">Register & Generate QR</button>

</form>

<p id="msg"></p>

<div id="qrcode"></div>

<button id="downloadBtn" onclick="downloadPDF()">Download QR PDF</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase */

const firebaseConfig = {
apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
authDomain: "smart-traffic-30f86.firebaseapp.com",
projectId: "smart-traffic-30f86",
storageBucket: "smart-traffic-30f86.appspot.com",
messagingSenderId: "16532299128",
appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let qrImage="";
let vehicleID="";

/* Register */

window.registerVehicle = async function(){

let name=document.getElementById("name").value;
let vehicle=document.getElementById("vehicle").value;
let license=document.getElementById("license").value;
let license_expiry=document.getElementById("license_expiry").value;
let puc=document.getElementById("puc").value;
let puc_expiry=document.getElementById("puc_expiry").value;
let insurance=document.getElementById("insurance").value;
let insurance_expiry=document.getElementById("insurance_expiry").value;

if(!name || !vehicle || !license || !license_expiry || !puc || !puc_expiry || !insurance || !insurance_expiry){

document.getElementById("msg").innerHTML="Fill all fields";
return;

}

/* Save Data */

const docRef = await addDoc(collection(db,"vehicles"),{

name,
vehicle,
license,
license_expiry,
puc,
puc_expiry,
insurance,
insurance_expiry

});

vehicleID = docRef.id;

document.getElementById("msg").innerHTML="Registered Successfully";

/* QR Generate → ONLY ID */

let qrData = vehicleID;

qrImage="https://api.qrserver.com/v1/create-qr-code/?size=250x250&bgcolor=ffffff&data="+qrData;

document.getElementById("qrcode").innerHTML="<img src='"+qrImage+"'>";

document.getElementById("downloadBtn").style.display="block";

}

/* PDF Download */

window.downloadPDF=function(){

const { jsPDF } = window.jspdf;

let pdf=new jsPDF();

/* QR only */

pdf.addImage(qrImage,"PNG",70,60,70,70);

pdf.save("vehicle_qr.pdf");

}

</script>

</body>

</html>
