<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Registration</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Roboto', sans-serif;
  }

  body {
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: #fff;
    padding: 40px 30px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 700px;
  }

  h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #333;
  }

  form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 30px;
  }

  label {
    font-size: 14px;
    color: #555;
    margin-bottom: 5px;
    display: block;
  }

  input[type="text"],
  input[type="date"] {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    transition: 0.3s;
  }

  input[type="text"]:focus,
  input[type="date"]:focus {
    border-color: #007bff;
    outline: none;
  }

  button {
    grid-column: span 2;
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: #fff;
    border: none;
    font-size: 16px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #0056b3;
  }

  #msg {
    grid-column: span 2;
    margin-top: 20px;
    text-align: center;
    font-weight: 500;
  }

  #msg a {
    color: #007bff;
    text-decoration: none;
    font-weight: 500;
  }

  #msg a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>
  <div class="container">
    <h2>Vehicle Registration</h2>
    <form id="vehicleForm">
      <div>
        <label for="name">Owner Name</label>
        <input type="text" id="name" placeholder="Enter Owner Name">
      </div>

      <div>
        <label for="vehicle">Vehicle Number</label>
        <input type="text" id="vehicle" placeholder="Enter Vehicle Number">
      </div>

      <div>
        <label for="license">License Number</label>
        <input type="text" id="license" placeholder="Enter License Number">
      </div>

      <div>
        <label for="license_expiry">License Expiry Date</label>
        <input type="date" id="license_expiry">
      </div>

      <div>
        <label for="puc">PUC Number</label>
        <input type="text" id="puc" placeholder="Enter PUC Number">
      </div>

      <div>
        <label for="puc_expiry">PUC Expiry Date</label>
        <input type="date" id="puc_expiry">
      </div>

      <div>
        <label for="insurance">Insurance ID</label>
        <input type="text" id="insurance" placeholder="Enter Insurance ID">
      </div>

      <div>
        <label for="insurance_expiry">Insurance Expiry Date</label>
        <input type="date" id="insurance_expiry">
      </div>

      <button type="button" onclick="registerVehicle()">Submit & Generate QR</button>
      <p id="msg"></p>
    </form>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
  authDomain: "smart-traffic-30f86.firebaseapp.com",
  projectId: "smart-traffic-30f86",
  storageBucket: "smart-traffic-30f86.firebasestorage.app",
  messagingSenderId: "16532299128",
  appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d",
  measurementId: "G-91R0R3QR0F"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.registerVehicle = async function() {
  let name = document.getElementById("name").value;
  let vehicle = document.getElementById("vehicle").value;
  let license = document.getElementById("license").value;
  let license_expiry = document.getElementById("license_expiry").value;
  let puc = document.getElementById("puc").value;
  let puc_expiry = document.getElementById("puc_expiry").value;
  let insurance = document.getElementById("insurance").value;
  let insurance_expiry = document.getElementById("insurance_expiry").value;

  if(!name || !vehicle || !license || !license_expiry || !puc || !puc_expiry || !insurance || !insurance_expiry){
    document.getElementById("msg").innerHTML = "<span style='color:red'>Please fill all fields!</span>";
    return;
  }

  const docRef = await addDoc(collection(db,"vehicles"),{
    name,
    vehicle,
    license,
    license_expiry,
    puc,
    puc_expiry,
    insurance,
    insurance_expiry
  });

  document.getElementById("msg").innerHTML =
    "Registered Successfully<br><br>" +
    "<a href='qr.html?id="+docRef.id+"'>Generate QR Code</a>";
}
</script>
</body>
</html>
