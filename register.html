<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Roboto',sans-serif;
}

body{
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#fff;
padding:40px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:100%;
max-width:700px;
}

h2{
text-align:center;
margin-bottom:30px;
}

form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
grid-column:span 2;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#msg{
grid-column:span 2;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Vehicle Registration</h2>

<form>

<input type="text" id="name" placeholder="Owner Name">

<input type="text" id="vehicle" placeholder="Vehicle Number">

<input type="text" id="license" placeholder="License Number">

<input type="date" id="license_expiry">

<input type="text" id="puc" placeholder="PUC Number">

<input type="date" id="puc_expiry">

<input type="text" id="insurance" placeholder="Insurance Number">

<input type="date" id="insurance_expiry">

<button type="button" onclick="registerVehicle()">Submit & Generate QR</button>

<p id="msg"></p>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, addDoc }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",

authDomain: "smart-traffic-30f86.firebaseapp.com",

projectId: "smart-traffic-30f86",

storageBucket: "smart-traffic-30f86.appspot.com",

messagingSenderId: "16532299128",

appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.registerVehicle = async function(){

let name=document.getElementById("name").value;
let vehicle=document.getElementById("vehicle").value;

let license=document.getElementById("license").value;
let license_expiry=document.getElementById("license_expiry").value;

let puc=document.getElementById("puc").value;
let puc_expiry=document.getElementById("puc_expiry").value;

let insurance=document.getElementById("insurance").value;
let insurance_expiry=document.getElementById("insurance_expiry").value;

if(!name || !vehicle){

document.getElementById("msg").innerHTML="Enter required fields";
return;

}

const docRef = await addDoc(collection(db,"vehicles"),{

name,
vehicle,
license,
license_expiry,
puc,
puc_expiry,
insurance,
insurance_expiry

});

document.getElementById("msg").innerHTML="Registered Successfully";

setTimeout(()=>{

window.location.href="qr.html?id="+docRef.id;

},1000);

}

</script>

</body>
</html>
