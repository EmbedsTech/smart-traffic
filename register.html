<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Roboto',sans-serif;
}

body{
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#fff;
padding:40px 30px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:100%;
max-width:700px;
}

h2{
text-align:center;
margin-bottom:30px;
color:#333;
}

form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px 30px;
}

label{
font-size:14px;
color:#555;
margin-bottom:5px;
display:block;
}

input[type="text"],
input[type="date"],
input[type="file"]{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
grid-column:span 2;
padding:12px;
background:#007bff;
color:#fff;
border:none;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#msg{
grid-column:span 2;
text-align:center;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Vehicle Registration</h2>

<form>

<div>
<label>Owner Name</label>
<input type="text" id="name">
</div>

<div>
<label>Vehicle Number</label>
<input type="text" id="vehicle">
</div>

<div>
<label>License Number</label>
<input type="text" id="license">
</div>

<div>
<label>License Expiry</label>
<input type="date" id="license_expiry">
</div>

<div>
<label>Upload License Image</label>
<input type="file" id="license_img">
</div>

<div>
<label>PUC Number</label>
<input type="text" id="puc">
</div>

<div>
<label>PUC Expiry</label>
<input type="date" id="puc_expiry">
</div>

<div>
<label>Upload PUC Image</label>
<input type="file" id="puc_img">
</div>

<div>
<label>Insurance ID</label>
<input type="text" id="insurance">
</div>

<div>
<label>Insurance Expiry</label>
<input type="date" id="insurance_expiry">
</div>

<div>
<label>Upload Insurance Image</label>
<input type="file" id="insurance_img">
</div>

<button type="button" onclick="registerVehicle()">Submit & Generate QR</button>

<p id="msg"></p>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyCeZTuuAKhj-yhs3bIAHHPvOX-bmQN8XjE",
authDomain: "smart-traffic-30f86.firebaseapp.com",
projectId: "smart-traffic-30f86",
storageBucket: "smart-traffic-30f86.appspot.com",
messagingSenderId: "16532299128",
appId: "1:16532299128:web:f71dd3d315d6c57f15fc8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.registerVehicle = async function(){

let name=document.getElementById("name").value;
let vehicle=document.getElementById("vehicle").value;

let license=document.getElementById("license").value;
let license_expiry=document.getElementById("license_expiry").value;
let license_img=document.getElementById("license_img").files[0];

let puc=document.getElementById("puc").value;
let puc_expiry=document.getElementById("puc_expiry").value;
let puc_img=document.getElementById("puc_img").files[0];

let insurance=document.getElementById("insurance").value;
let insurance_expiry=document.getElementById("insurance_expiry").value;
let insurance_img=document.getElementById("insurance_img").files[0];

if(!name || !vehicle || !license || !license_expiry || !puc || !puc_expiry || !insurance || !insurance_expiry){
document.getElementById("msg").innerHTML="Fill all fields";
return;
}

/* Upload images */

const licenseRef=ref(storage,"license/"+license_img.name);
await uploadBytes(licenseRef,license_img);
const licenseURL=await getDownloadURL(licenseRef);

const pucRef=ref(storage,"puc/"+puc_img.name);
await uploadBytes(pucRef,puc_img);
const pucURL=await getDownloadURL(pucRef);

const insuranceRef=ref(storage,"insurance/"+insurance_img.name);
await uploadBytes(insuranceRef,insurance_img);
const insuranceURL=await getDownloadURL(insuranceRef);

/* Save data in firestore */

const docRef=await addDoc(collection(db,"vehicles"),{

name,
vehicle,

license,
license_expiry,
license_image:licenseURL,

puc,
puc_expiry,
puc_image:pucURL,

insurance,
insurance_expiry,
insurance_image:insuranceURL

});

document.getElementById("msg").innerHTML=
"Registered Successfully <br><br>"+
"<a href='qr.html?id="+docRef.id+"'>Generate QR Code</a>";

}

</script>

</body>
</html>
