<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Traffic Home</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    text-align: center;
    background: #fff;
    padding: 40px 30px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
  }

  h1 {
    margin-bottom: 30px;
    color: #333;
  }

  button {
    padding: 15px 25px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #0056b3;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Welcome to Smart Traffic</h1>
  <p>Click below to register your vehicle:</p>
  <button onclick="goToRegister()">Register Vehicle</button>
</div>

<script>
  function goToRegister() {
    // Redirect to the registration page
    window.location.href = "register.html";
  }
</script>

</body>
</html>
