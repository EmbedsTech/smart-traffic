<!DOCTYPE html>
<html>

<head>

<title>Vehicle Verification</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

#status{
font-size:60px;
font-weight:bold;
margin-bottom:20px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid black;
padding:10px;
}

</style>

</head>

<body>

<h1>Vehicle Verification System</h1>

<div id="status">WAITING...</div>

<table>

<tr>
<th>Vehicle Number</th>
<td id="veh"></td>
</tr>

<tr>
<th>Owner Name</th>
<td id="owner"></td>
</tr>

<tr>
<th>PUC Expiry</th>
<td id="puc"></td>
</tr>

<tr>
<th>License Expiry</th>
<td id="lic"></td>
</tr>

</table>

<script>

function checkStatus(){

fetch("https://traffic-qr-verifier-2.onrender.com/result")

.then(res => res.json())

.then(data =>{

if(data.status=="VALID"){

document.getElementById("status").innerHTML="VALID";
document.body.style.background="lightgreen";

}

else if(data.status=="INVALID"){

document.getElementById("status").innerHTML="INVALID";
document.body.style.background="salmon";

}

document.getElementById("veh").innerHTML=data.vehicle_no || "";
document.getElementById("owner").innerHTML=data.owner_name || "";
document.getElementById("puc").innerHTML=data.puc_expiry || "";
document.getElementById("lic").innerHTML=data.license_expiry || "";

});

}

setInterval(checkStatus,2000);

</script>

</body>

</html>
