<!DOCTYPE html>
<html>

<head>

<title>Smart Document Verification System</title>

<style>

body{
font-family:Arial;
text-align:center;
margin:0;
min-height:100vh;
background: linear-gradient(135deg,#eaf4ff 0%,#d6e9ff 50%,#eaf4ff 100%);
}

h1{
font-family:Times New Roman;
text-decoration:underline;
font-size:40px;
margin-top:30px;
margin-bottom:30px;
}

/* table */

table{
margin:auto;
border-collapse:collapse;
width:70%;
font-size:20px;

/* glass effect */
background: rgba(255,255,255,0.6);
backdrop-filter: blur(10px);
border-radius:15px;
overflow:hidden;

/* shadow */
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

th,td{
padding:14px;
border-bottom:1px solid rgba(0,0,0,0.1);
text-align:center;
}

th{
background:rgba(255,255,255,0.8);
font-weight:bold;
}

/* status badge */

.valid{
color:white;
background:#4CAF84;
padding:6px 16px;
border-radius:20px;
font-weight:bold;
font-size:14px;
}

.invalid{
color:white;
background:#e74c3c;
padding:6px 16px;
border-radius:20px;
font-weight:bold;
font-size:14px;
}

/* FINAL RESULT RECTANGLE */

#final_status{
margin-top:40px;
font-size:32px;
font-weight:bold;
padding:18px 40px;
width:500px;
margin-left:auto;
margin-right:auto;
border-radius:40px;
color:white;

box-shadow:0 10px 20px rgba(0,0,0,0.2);
}


/* colors */
.final_valid{
background:linear-gradient(90deg,#5fd18c,#3fbf9c);
}

.final_invalid{
background:linear-gradient(90deg,#ff6b6b,#e74c3c);
}

</style>

</head>

<body>

<h1>Smart Document Verification System</h1>

<table>

<tr>
<th>Title</th>
<th>Details</th>
<th>Status</th>
</tr>

<tr>
<th>Owner Name</th>
<td id="owner">-</td>
<td>-</td>
</tr>

<tr>
<th>Vehicle Number</th>
<td id="veh">-</td>
<td>-</td>
</tr>

<tr>
<th>PUC Number</th>
<td id="puc">-</td>
<td>-</td>
</tr>

<tr>
<th>PUC Expiry</th>
<td id="puc_exp">-</td>
<td id="puc_status">-</td>
</tr>

<tr>
<th>License Number</th>
<td id="lic">-</td>
<td>-</td>
</tr>

<tr>
<th>License Expiry</th>
<td id="lic_exp">-</td>
<td id="lic_status">-</td>
</tr>

<tr>
<th>Insurance Number</th>
<td id="ins">-</td>
<td>-</td>
</tr>

<tr>
<th>Insurance Expiry</th>
<td id="ins_exp">-</td>
<td id="ins_status">-</td>
</tr>

</table>

<div id="final_status">CHECKING...</div>

<script>

function checkStatus(){

fetch("https://traffic-api-pjz9.onrender.com/result")

.then(res=>res.json())

.then(data=>{

/* Data */

document.getElementById("owner").innerHTML=data.name || "-";
document.getElementById("veh").innerHTML=data.vehicle || "-";

document.getElementById("puc").innerHTML=data.puc || "-";
document.getElementById("puc_exp").innerHTML=data.puc_expiry || "-";

document.getElementById("lic").innerHTML=data.license || "-";
document.getElementById("lic_exp").innerHTML=data.license_expiry || "-";

document.getElementById("ins").innerHTML=data.insurance || "-";
document.getElementById("ins_exp").innerHTML=data.insurance_expiry || "-";

/* Expiry Check */

let today=new Date();

let puc_valid=new Date(data.puc_expiry)>=today;
let lic_valid=new Date(data.license_expiry)>=today;
let ins_valid=new Date(data.insurance_expiry)>=today;

/* Individual status */

document.getElementById("puc_status").innerHTML =
puc_valid ? "<span class='valid'>VALID</span>" : "<span class='invalid'>INVALID</span>";

document.getElementById("lic_status").innerHTML =
lic_valid ? "<span class='valid'>VALID</span>" : "<span class='invalid'>INVALID</span>";

document.getElementById("ins_status").innerHTML =
ins_valid ? "<span class='valid'>VALID</span>" : "<span class='invalid'>INVALID</span>";

/* Final Status */

let finalBox=document.getElementById("final_status");

if(puc_valid && lic_valid && ins_valid){

finalBox.innerHTML="✔ DOCUMENTS VALID";
finalBox.className="final_valid";

}else{

finalBox.innerHTML="✖ DOCUMENTS INVALID";
finalBox.className="final_invalid";

}

})

}

setInterval(checkStatus,2000);

</script>

</body>

</html>
