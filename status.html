<!DOCTYPE html>
<html>

<head>

<title>Smart Document Verification System</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f6f8;
margin:0;
padding:0;
}

h1{
font-family:Times New Roman;
text-decoration:underline;
font-size:40px;
margin-top:30px;
margin-bottom:30px;
}

/* table */

table{
margin:auto;
border-collapse:collapse;
width:70%;
font-size:20px;
background:#f0f0f0;
border:3px solid black;
}

th,td{
border:1px solid #bbb;
padding:12px;
text-align:center;
}

th{
background:#e0e0e0;
}

/* status badge */

.valid{
color:white;
background:#28a745;
padding:5px 12px;
border-radius:5px;
font-weight:bold;
}

.invalid{
color:white;
background:#dc3545;
padding:5px 12px;
border-radius:5px;
font-weight:bold;
}

/* final result */

#final_status{
margin-top:40px;
font-size:50px;
font-weight:bold;
padding:15px;
width:350px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
}

.final_valid{
background:#28a745;
color:white;
}

.final_invalid{
background:#dc3545;
color:white;
}

</style>

</head>

<body>

<h1>Smart Document Verification System</h1>

<table>

<tr>
<th>Title</th>
<th>Details</th>
<th>Status</th>
</tr>

<tr>
<th>Owner Name</th>
<td id="owner">-</td>
<td>-</td>
</tr>

<tr>
<th>Vehicle Number</th>
<td id="veh">-</td>
<td>-</td>
</tr>

<tr>
<th>PUC Number</th>
<td id="puc">-</td>
<td>-</td>
</tr>

<tr>
<th>PUC Expiry</th>
<td id="puc_exp">-</td>
<td id="puc_status">-</td>
</tr>

<tr>
<th>License Number</th>
<td id="lic">-</td>
<td>-</td>
</tr>

<tr>
<th>License Expiry</th>
<td id="lic_exp">-</td>
<td id="lic_status">-</td>
</tr>

<tr>
<th>Insurance Number</th>
<td id="ins">-</td>
<td>-</td>
</tr>

<tr>
<th>Insurance Expiry</th>
<td id="ins_exp">-</td>
<td id="ins_status">-</td>
</tr>

</table>

<div id="final_status">CHECKING...</div>

<script>

function checkStatus(){

fetch("https://traffic-api-pjz9.onrender.com/result")

.then(res=>res.json())

.then(data=>{

console.log(data);

/* Data */

document.getElementById("owner").innerHTML=data.name || "-";
document.getElementById("veh").innerHTML=data.vehicle || "-";

document.getElementById("puc").innerHTML=data.puc || "-";
document.getElementById("puc_exp").innerHTML=data.puc_expiry || "-";

document.getElementById("lic").innerHTML=data.license || "-";
document.getElementById("lic_exp").innerHTML=data.license_expiry || "-";

document.getElementById("ins").innerHTML=data.insurance || "-";
document.getElementById("ins_exp").innerHTML=data.insurance_expiry || "-";

/* Expiry Check */

let today=new Date();

let puc_valid=new Date(data.puc_expiry)>=today;
let lic_valid=new Date(data.license_expiry)>=today;
let ins_valid=new Date(data.insurance_expiry)>=today;

/* Individual status */

document.getElementById("puc_status").innerHTML=
puc_valid ? "<span class='valid'>VALID</span>" : "<span class='invalid'>INVALID</span>";

document.getElementById("lic_status").innerHTML=
lic_valid ? "<span class='valid'>VALID</span>" : "<span class='invalid'>INVALID</span>";

document.getElementById("ins_status").innerHTML=
ins_valid ? "<span class='valid'>VALID</span>" : "<span class='invalid'>INVALID</span>";

/* Final Status */

let finalBox=document.getElementById("final_status");

if(puc_valid && lic_valid && ins_valid){

finalBox.innerHTML="✔ DOCUMENTS VALID";
finalBox.className="final_valid";

}else{

finalBox.innerHTML="✖ DOCUMENTS INVALID";
finalBox.className="final_invalid";

}

})

}

setInterval(checkStatus,2000);

</script>

</body>

</html>
