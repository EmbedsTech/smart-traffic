<!DOCTYPE html>
<html>

<head>

<title>Smart Document Verification System</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

h1{
font-family:Times New Roman;
text-decoration:underline;
font-size:40px;
margin-bottom:20px;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
font-size:20px;
background:#d9d9d9;
border:3px solid black;
}

th,td{
border:1px solid #999;
padding:12px;
text-align:center;
}

th{
background:#cfcfcf;
}

#final_status{
font-size:50px;
font-weight:bold;
margin-top:30px;
}

</style>

</head>

<body>

<h1>Smart Document Verification System</h1>

<table>

<tr>
<th>Title</th>
<th>Details</th>
<th>Status</th>
</tr>

<tr>
<th>Owner Name</th>
<td id="owner"></td>
<td>-</td>
</tr>

<tr>
<th>Vehicle Number</th>
<td id="veh"></td>
<td>-</td>
</tr>

<tr>
<th>PUC Number</th>
<td id="puc"></td>
<td>-</td>
</tr>

<tr>
<th>PUC Expiry</th>
<td id="puc_exp"></td>
<td id="puc_status"></td>
</tr>

<tr>
<th>License Number</th>
<td id="lic"></td>
<td>-</td>
</tr>

<tr>
<th>License Expiry</th>
<td id="lic_exp"></td>
<td id="lic_status"></td>
</tr>

<tr>
<th>Insurance Number</th>
<td id="ins"></td>
<td>-</td>
</tr>

<tr>
<th>Insurance Expiry</th>
<td id="ins_exp"></td>
<td id="ins_status"></td>
</tr>

</table>

<div id="final_status">CHECKING...</div>

<script>

function checkStatus(){

fetch("https://traffic-api-pjz9.onrender.com/result")

.then(res => res.json())

.then(data =>{

console.log(data);

/* Data Fetch */

document.getElementById("owner").innerHTML=data.name || "-";
document.getElementById("veh").innerHTML=data.vehicle || "-";

document.getElementById("puc").innerHTML=data.puc || "-";
document.getElementById("puc_exp").innerHTML=data.puc_expiry || "-";

document.getElementById("lic").innerHTML=data.license || "-";
document.getElementById("lic_exp").innerHTML=data.license_expiry || "-";

document.getElementById("ins").innerHTML=data.insurance || "-";
document.getElementById("ins_exp").innerHTML=data.insurance_expiry || "-";

/* Expiry Check */

let today = new Date();

let puc_valid = new Date(data.puc_expiry) >= today;
let lic_valid = new Date(data.license_expiry) >= today;
let ins_valid = new Date(data.insurance_expiry) >= today;

/* Individual Status */

document.getElementById("puc_status").innerHTML = puc_valid ? "VALID" : "INVALID";
document.getElementById("lic_status").innerHTML = lic_valid ? "VALID" : "INVALID";
document.getElementById("ins_status").innerHTML = ins_valid ? "VALID" : "INVALID";

/* Final Status */

if(puc_valid && lic_valid && ins_valid){

document.getElementById("final_status").innerHTML="FINAL STATUS : VALID";
document.body.style.background="#9cff9c";

}else{

document.getElementById("final_status").innerHTML="FINAL STATUS : INVALID";
document.body.style.background="#ff9c9c";

}

})

}

setInterval(checkStatus,2000);

</script>

</body>

</html>
