<!DOCTYPE html>
<html>

<head>

<title>Smart Document Verification System</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

h1{
font-family:Algerian;
text-decoration:underline;
font-size:40px;
margin-bottom:20px;
}

#status{
font-size:60px;
font-weight:bold;
margin:20px;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
font-size:20px;
background:white;
border:3px solid black;
}

th,td{
border:3px solid black;
padding:14px;
text-align:center;
}

th{
background:#ddd;
font-size:22px;
}

</style>

</head>

<body>

<h1>Smart Document Verification System</h1>

<div id="status">WAITING...</div>

<table>

<tr>
<th>Vehicle Number</th>
<th>Owner Name</th>
<th>PUC Expiry</th>
<th>License Expiry</th>
</tr>

<tr>
<td id="veh">-</td>
<td id="owner">-</td>
<td id="puc">-</td>
<td id="lic">-</td>
</tr>

</table>

<script>

function checkStatus(){

fetch("https://traffic-api-pjz9.onrender.com/result")

.then(res => res.json())

.then(data =>{

console.log(data);

if(data.status=="VALID"){

document.getElementById("status").innerHTML="VALID";
document.body.style.background="#9cff9c";

}

else if(data.status=="INVALID"){

document.getElementById("status").innerHTML="INVALID";
document.body.style.background="#ff9c9c";

}

document.getElementById("veh").innerHTML=data.vehicle || "-";
document.getElementById("owner").innerHTML=data.name || "-";
document.getElementById("puc").innerHTML=data.puc_expiry || "-";
document.getElementById("lic").innerHTML=data.license_expiry || "-";

})

}

setInterval(checkStatus,2000);

</script>

</body>

</html>
