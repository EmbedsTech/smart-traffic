<!DOCTYPE html>
<html>

<head>

<title>Smart Document Verification System</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

h1{
font-family:Times New Roman;
text-decoration:underline;
font-size:40px;
margin-bottom:20px;
}
  
#status{
font-size:60px;
font-weight:bold;
margin:20px;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
font-size:20px;
background:white;
border:3px solid black;
}
  
th,td{
border:1px solid black;
padding:12px;
text-align:center;
}

th{
font-weight:bold;
}
  
</style>

</head>

<body>

<h1>Smart Document Verification System</h1>

<div id="status">WAITING...</div>

<table>

<tr>
<th>Title</th>
<th>Details</th>
<th>Status</th>
</tr>
  
<tr>
<th>Owner Name</th>
<td id="owner"></td>
</tr>

<tr>
<th>Vehicle Number</th>
<td id="veh"></td>
</tr>

<tr>
<th>PUC Number</th>
<td id="puc_no"></td>
</tr>

<tr>
<th>PUC Expiry</th>
<td id="puc"></td>
<td id="puc_status"></td>
</tr>

<tr>
<th>License Number</th>
<td id="lic_no"></td>
</tr>

<tr>
<th>License Expiry</th>
<td id="lic"></td>
<td id="lic_status"></td>
</tr>

<tr>
<th>Insurance Number</th>
<td id="ins_no"></td>
</tr>

<tr>
<th>Insurance Expiry</th>
<td id="ins"></td>
<td id="ins_status"></td>
</tr>

</table>

<script>

if(localStorage.getItem("auth")!="true"){

window.location="login.html";

}

function checkStatus(){

fetch("https://traffic-api-pjz9.onrender.com/result")

.then(res=>res.json())

.then(data=>{

console.log(data);
  
if(data.status=="VALID"){

document.getElementById("status").innerHTML="VALID";
document.body.style.background="#9cff9c";

}

else if(data.status=="INVALID"){

document.getElementById("status").innerHTML="INVALID";
document.body.style.background="#ff9c9c";

}

document.getElementById("owner").innerHTML = data.name || "-";
document.getElementById("veh").innerHTML = data.vehicle || "-";

document.getElementById("puc").innerHTML = data.puc || "-";
document.getElementById("puc_exp").innerHTML = data.puc_expiry || "-";

document.getElementById("lic").innerHTML = data.license || "-";
document.getElementById("lic_exp").innerHTML = data.license_expiry || "-";

document.getElementById("ins").innerHTML = data.insurance || "-";
document.getElementById("ins_exp").innerHTML = data.insurance_expiry || "-";

})

}

setInterval(checkStatus,2000);

</script>

</body>

</html>
